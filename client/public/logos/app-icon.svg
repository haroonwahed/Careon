<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Rounded dark container -->
  <rect width="512" height="512" rx="108" fill="#060b17"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="appIconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b82ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b3ee6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- CL Mark centered in square -->
  <!-- Vertical line (taller above crossbar) -->
  <line x1="256" y1="140" x2="256" y2="372" stroke="url(#appIconGradient)" stroke-width="42" stroke-linecap="round"/>

  <!-- Horizontal crossbar (at ~35% from top) -->
  <line x1="160" y1="230" x2="352" y2="230" stroke="url(#appIconGradient)" stroke-width="42" stroke-linecap="round"/>
</svg>
