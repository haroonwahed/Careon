# Optional: scheduled HTTP smoke against the deployed staging web service.
# Default origin matches current pilot Render URL; override with repo variable STAGING_BASE_URL.
name: Staging HTTP smoke

on:
  workflow_dispatch:
  schedule:
    # Mondays 08:00 UTC — adjust if you prefer another window
    - cron: "0 8 * * 1"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run HTTP smoke
        env:
          # Repository variable (Settings → Secrets and variables → Actions → Variables).
          # If unset, falls back to the known staging host documented in docs/GO_LIVE_ONE_PAGE_RUNBOOK.md
          STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}
        run: |
          set -euo pipefail
          export BASE_URL="${STAGING_BASE_URL:-https://careon-web.onrender.com}"
          chmod +x scripts/go_live_http_smoke.sh
          ./scripts/go_live_http_smoke.sh
