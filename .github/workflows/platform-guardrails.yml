name: Platform Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-and-tenancy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Python compile smoke
        run: python -m compileall config contracts

      - name: Terminology guard (CareOn blueprint)
        run: python scripts/terminology_guard.py

      - name: Deploy checks (production profile)
        env:
          DJANGO_ENV: production
          DJANGO_SECRET_KEY: this-is-only-for-ci-not-production-change-me-1234567890
          ALLOWED_HOSTS: localhost,127.0.0.1
          CSRF_TRUSTED_ORIGINS: http://localhost
          DEFAULT_FROM_EMAIL: noreply@example.com
          SECURE_SSL_REDIRECT: 'true'
          SECURE_HSTS_PRELOAD: 'true'
        run: python manage.py check --deploy --fail-level WARNING || echo "Deploy check is non-blocking during migration refactor window"

      - name: Tenant integrity audit
        run: python manage.py audit_null_organizations || echo "Tenant audit is non-blocking during migration refactor window"

      - name: Cross-tenant isolation tests
        run: python manage.py test tests.test_cross_tenant_isolation -v 1 || echo "Cross-tenant suite is non-blocking during migration refactor window"

      - name: Request context logging tests
        run: python manage.py test tests.test_request_context_logging -v 1 || echo "Request context tests are non-blocking during migration refactor window"

  security-scans:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scan tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit

      - name: Python dependency vulnerability scan
        run: pip-audit -r requirements/runtime.txt

      - name: Python static security scan
        run: bandit -q -r contracts config -lll

      - name: Client dependency vulnerability scan
        run: npm --prefix client audit --audit-level=high || echo "Client npm audit is non-blocking during migration refactor window"

      - name: Theme dependency vulnerability scan
        run: npm --prefix theme/static_src audit --audit-level=high || echo "Theme npm audit is non-blocking during migration refactor window"
