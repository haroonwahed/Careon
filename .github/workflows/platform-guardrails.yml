name: Platform Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-and-tenancy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Pytest (Django suite)
        env:
          DJANGO_SECRET_KEY: this-is-only-for-ci-not-production-change-me-1234567890
          DJANGO_DEBUG: '0'
          SSO_ENABLED: '0'
        run: python -m pytest tests/ -q

      - name: Python compile smoke
        run: python -m compileall config contracts

      - name: Terminology guard (CareOn blueprint)
        run: python scripts/terminology_guard.py

      - name: Tenant integrity audit
        run: python manage.py audit_null_organizations

  deploy-production-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: careon_ci_deploy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d careon_ci_deploy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Wait for PostgreSQL (service health race)
        shell: bash
        run: |
          for i in {1..45}; do
            if timeout 2 bash -c 'echo > /dev/tcp/127.0.0.1/5432' 2>/dev/null; then
              echo "postgres: accepting connections"
              exit 0
            fi
            echo "postgres: wait attempt ${i}/45"
            sleep 2
          done
          echo "postgres did not become reachable on 127.0.0.1:5432"
          exit 1

      - name: Django deploy system check (production settings + Postgres)
        env:
          DJANGO_SETTINGS_MODULE: config.settings_production
          DJANGO_DEBUG: '0'
          SSO_ENABLED: '0'
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/careon_ci_deploy?sslmode=disable
          DJANGO_SECRET_KEY: ci-deploy-check-not-for-production-abcdefghijklmnopqrstuvwxyz0123456789
          ALLOWED_HOSTS: localhost,127.0.0.1
          CSRF_TRUSTED_ORIGINS: https://localhost,http://127.0.0.1:8000
          DEFAULT_FROM_EMAIL: ci-notify@example.com
          SECURE_SSL_REDIRECT: 'true'
          SECURE_HSTS_PRELOAD: 'true'
          SECURE_HSTS_SECONDS: '3600'
        run: |
          python manage.py migrate --noinput
          python manage.py check --deploy --fail-level WARNING

  security-scans:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install scan tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit

      - name: Python dependency vulnerability scan
        run: pip-audit -r requirements/runtime.txt

      - name: Python static security scan
        run: bandit -q -r contracts config -lll

      - name: Install client + theme deps (reproducible tree for npm audit)
        run: |
          npm --prefix client ci
          npm --prefix theme/static_src ci

      - name: Client dependency vulnerability scan
        run: npm --prefix client audit --audit-level=high

      - name: Theme dependency vulnerability scan
        run: npm --prefix theme/static_src audit --audit-level=high
