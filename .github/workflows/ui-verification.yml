name: UI Verification

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Apply database migrations
        run: python manage.py migrate --noinput

      - name: Audit tenant-owned models for NULL organizations
        run: python manage.py audit_null_organizations

      - name: Ensure verifier is executable
        run: chmod +x scripts/verify_ui.sh

      - name: Run UI verification suite
        run: ./scripts/verify_ui.sh
