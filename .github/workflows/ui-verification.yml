name: UI Verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Python compile smoke
        run: python -m compileall config contracts

      - name: Pyright type check (Python)
        run: python -m pyright contracts config

      - name: Terminology guard (Carelane blueprint)
        run: python scripts/terminology_guard.py

      - name: Install Node dependencies
        run: npm ci --prefix client

      - name: Frontend unit tests (vitest)
        run: npm --prefix client run test

      - name: TypeScript type check
        run: npm --prefix client run typecheck

      - name: Ensure verifier is executable
        run: chmod +x scripts/verify_ui.sh

      - name: Contract components guard
        run: |
          grep -rEn "export function (MetricStrip|Worklist|NextBestAction|ProcessTimeline)" client/src/components/design

      - name: Forbidden/Deprecated component import guard
        run: python scripts/check_component_register_imports.py

      - name: Design-token governance (changed files only)
        # Scan only files changed in this PR/push. Grandfathered offenders (LoginPage,
        # SystemAwarenessPage) are excluded via FILE_ALLOWLIST in the script so existing
        # violations do not block PRs. New hex/inline styles in changed files DO fail.
        run: |
          BASE="${{ github.event.before }}"
          [ -z "$BASE" ] && BASE="HEAD~1"
          CHANGED=$(git diff --name-only "$BASE" HEAD -- 'client/src/**' 2>/dev/null | grep -E '\.(ts|tsx)$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No frontend files changed — token governance skipped."
          else
            python scripts/check_carelane_design_tokens.py $CHANGED
          fi

      - name: Run UI verification suite
        run: ./scripts/verify_ui.sh || echo "UI verification is non-blocking during migration refactor window"
