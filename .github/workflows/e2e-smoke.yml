name: E2E Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  playwright-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DJANGO_SETTINGS_MODULE: config.settings_test
      SECRET_KEY: ci-smoke-secret-key-not-for-production
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      DATABASE_URL: "sqlite:///./db_ci.sqlite3"
      E2E_BASE_URL: "http://127.0.0.1:8010"
      E2E_SPA_URL: "http://127.0.0.1:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run Django migrations
        run: python manage.py migrate --run-syncdb --noinput

      - name: Seed smoke data
        run: |
          python manage.py seed_redesign_data || python manage.py seed_demo_data || true
          python manage.py seed_pilot_e2e || true

      - name: Start Django dev server
        run: |
          python manage.py runserver 127.0.0.1:8010 &
          echo "Django PID=$!" >> $GITHUB_ENV

      - name: Install Node dependencies
        run: npm ci --prefix client

      - name: Build SPA
        run: npm --prefix client run build

      - name: Install Playwright browsers
        run: npx --prefix client playwright install --with-deps chromium

      - name: Wait for Django
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8010/_health/ && break
            sleep 2
          done

      - name: Run Playwright smoke specs
        run: |
          npx --prefix client playwright test \
            tests/e2e/pilot-smoke.spec.ts \
            tests/e2e/staging-shell-smoke.spec.ts \
            tests/e2e/provider-review-smoke.spec.ts \
            --reporter=list

      - name: Upload Playwright traces/screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-traces
          path: |
            client/test-results/
            client/playwright-report/
          retention-days: 7
