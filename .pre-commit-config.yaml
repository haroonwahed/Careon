exclude: '^(venv/|\.venv/|\.venv312/|staticfiles/|logs/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
        exclude: '\.md$'
      - id: check-yaml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: local
    hooks:
      - id: terminology-guard
        name: Terminology guard (Careon blueprint)
        entry: .venv/bin/python scripts/terminology_guard.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: django-check
        name: Django system check
        entry: .venv/bin/python manage.py check
        language: system
        pass_filenames: false
        always_run: false
        types: [python]
        stages: [pre-commit]
