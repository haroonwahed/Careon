services:
  - type: web
    name: careon-web
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements/runtime.txt
      DJANGO_TEST_LOG_LEVEL=ERROR DATABASE_URL='sqlite:////tmp/careon-build.sqlite3' python manage.py check --settings=config.settings
      npm ci --prefix client
      npm run build --prefix client
      DATABASE_URL='sqlite:////tmp/careon-build.sqlite3' python manage.py collectstatic --noinput --settings=config.settings
      DATABASE_URL='sqlite:////tmp/careon-build.sqlite3' python manage.py migrate --noinput --settings=config.settings
    # One line so manual Start Command on Render can match: bash scripts/render_start_command.sh
    startCommand: bash scripts/render_start_command.sh
    envVars:
      # Unbuffered Python stdout/stderr so migrate/gunicorn lines show in Render logs without delay.
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: NODE_VERSION
        value: 20.18.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      # Public site URL for Django templates (nav links). Set to https://<your-service>.onrender.com
      - key: SPA_ORIGIN
        sync: false
      # Must match Google OAuth authorized redirect URI origin (https://<host>, not :3000).
      - key: OIDC_PUBLIC_BASE_URL
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: "true"
      # Optional. When set, overrides Render WEB_CONCURRENCY for gunicorn --workers (e.g. 2 on free tier).
      - key: GUNICORN_WORKERS
        sync: false
      # Staging pilot: migrate + bootstrap on boot (see bootstrap_staging_pilot).
      # Existing demo_gemeente: sync passwords via seed_pilot_e2e. Full wipe: PILOT_FORCE_RESET=1 once in dashboard.
      - key: PILOT_AUTO_BOOTSTRAP
        value: "1"
      - key: E2E_DEMO_PASSWORD
        value: pilot_demo_pass_123
      # Cold start: set to 1 once to load full demo werkvoorraad (may fail if DB has legacy NOT NULL columns).
      - key: PILOT_FULL_DEMO_SEED
        value: "1"
