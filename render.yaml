services:
  - type: web
    name: careon-web
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements/runtime.txt
      DJANGO_TEST_LOG_LEVEL=ERROR DATABASE_URL='sqlite:////tmp/careon-build.sqlite3' python manage.py test tests --verbosity=1 --settings=config.settings
      npm ci --prefix client
      npm run build --prefix client
      DATABASE_URL='sqlite:////tmp/careon-build.sqlite3' python manage.py collectstatic --noinput --settings=config.settings
      DATABASE_URL='sqlite:////tmp/careon-build.sqlite3' python manage.py migrate --noinput --settings=config.settings
    startCommand: |
      REVISION="${RENDER_GIT_COMMIT:-${GIT_COMMIT:-}}"
      if [ -z "$REVISION" ] && command -v git >/dev/null 2>&1; then
        REVISION="$(git rev-parse --short HEAD 2>/dev/null || true)"
      fi
      if [ -z "$REVISION" ]; then
        REVISION="unknown"
      fi
      if [ ${#REVISION} -gt 7 ]; then
        REVISION="${REVISION:0:7}"
      fi
      echo "Starting careon-web revision=${REVISION}"
      if [ -z "$DATABASE_URL" ]; then
        echo "ERROR: DATABASE_URL is missing from the Render runtime environment."
        echo "Set it on the careon-web service, then redeploy."
        exit 1
      fi
      python scripts/render_startup_checks.py
      python manage.py migrate --noinput --settings=config.settings_production || exit 1
      # GUNICORN_WORKERS (optional) > Render's WEB_CONCURRENCY > default 2. Use GUNICORN_WORKERS to
      # raise throughput on larger instances; leave unset to follow Render's CPU-based WEB_CONCURRENCY.
      WORKERS="${GUNICORN_WORKERS:-${WEB_CONCURRENCY:-2}}"
      echo "gunicorn workers=${WORKERS}"
      # exec: gunicorn is PID 1 so Render SIGTERM reaches the master process (graceful shutdown).
      exec gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers "$WORKERS" --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: NODE_VERSION
        value: 20.18.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      # Public site URL for Django templates (nav links). Set to https://<your-service>.onrender.com
      - key: SPA_ORIGIN
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: "true"
      # Optional. When set, overrides Render WEB_CONCURRENCY for gunicorn --workers (e.g. 2 on free tier).
      - key: GUNICORN_WORKERS
        sync: false
