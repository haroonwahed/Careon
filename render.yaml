services:
  - type: web
    name: carelane
    runtime: python
    plan: free
    # Co-locate the app with the database. The Postgres (Supabase) lives in
    # eu-west-1 (Ireland); Frankfurt is Render's closest EU region. Without this
    # Render defaults to Oregon (US-West) — every DB query then crosses the
    # Atlantic (~130ms RTT), and pages that fire ~10+ queries take seconds.
    # NOTE: Render fixes a service's region at creation; applying this to the
    # live service requires recreating it in Frankfurt (DB stays in eu-west-1).
    region: frankfurt
    buildCommand: |
      pip install -r requirements/runtime.txt
      PYTHON_BIN="$(command -v python || command -v python3)"
      DJANGO_TEST_LOG_LEVEL=ERROR DATABASE_URL='sqlite:////tmp/carelane-build.sqlite3' "$PYTHON_BIN" manage.py check --settings=config.settings
      npm ci --prefix client
      npm run build --prefix client
      DATABASE_URL='sqlite:////tmp/carelane-build.sqlite3' "$PYTHON_BIN" manage.py collectstatic --noinput --settings=config.settings
      DATABASE_URL='sqlite:////tmp/carelane-build.sqlite3' "$PYTHON_BIN" manage.py migrate --noinput --settings=config.settings
    # One line so manual Start Command on Render can match: bash scripts/render_start_command.sh
    startCommand: bash scripts/render_start_command.sh
    envVars:
      # Unbuffered Python stdout/stderr so migrate/gunicorn lines show in Render logs without delay.
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: NODE_VERSION
        value: 20.18.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: www.carelane.nl
      - key: CSRF_TRUSTED_ORIGINS
        value: https://www.carelane.nl
      # Public site URL for Django templates (nav links).
      - key: SPA_ORIGIN
        value: https://www.carelane.nl
      # Must match Google OAuth authorized redirect URI origin.
      - key: OIDC_PUBLIC_BASE_URL
        value: https://www.carelane.nl
      # Google SSO (OIDC). The "Doorgaan met organisatieaccount" button on the
      # login page ONLY appears when SSO is fully configured. These were missing
      # from the blueprint, so a service recreate silently dropped SSO. Declared
      # here so they surface on every (re)create. Secrets stay unsynced; set
      # SSO_ENABLED=true and the client id/secret on the service. The discovery
      # endpoint + scopes are public Google constants, so they carry a value.
      - key: SSO_ENABLED
        sync: false
      - key: OIDC_RP_CLIENT_ID
        sync: false
      - key: OIDC_RP_CLIENT_SECRET
        sync: false
      - key: OIDC_OP_DISCOVERY_ENDPOINT
        value: https://accounts.google.com/.well-known/openid-configuration
      - key: OIDC_RP_SCOPES
        value: openid email profile
      # Optional map/geocoding (PDOK is default for backend geocoding).
      - key: GOOGLE_GEOCODING_API_KEY
        sync: false
      - key: VITE_MAP_BASEMAP
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: "true"
      # Optional. When set, overrides Render WEB_CONCURRENCY for gunicorn --workers (e.g. 2 on free tier).
      - key: GUNICORN_WORKERS
        sync: false
      # Staging pilot: migrate + bootstrap on boot (see bootstrap_staging_pilot).
      # Existing demo_gemeente: sync passwords via seed_pilot_e2e. Full wipe: PILOT_FORCE_RESET=1 once in dashboard.
      - key: PILOT_AUTO_BOOTSTRAP
        value: "1"
      - key: E2E_DEMO_PASSWORD
        value: pilot_demo_pass_123
      # Cold start: set to 1 once to load full demo werkvoorraad (may fail if DB has legacy NOT NULL columns).
      - key: PILOT_FULL_DEMO_SEED
        value: "1"
