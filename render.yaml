services:
  - type: web
    name: careon-web
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements/runtime.txt
      DJANGO_TEST_LOG_LEVEL=ERROR DATABASE_URL='sqlite:////tmp/careon-build.sqlite3' python manage.py test tests --verbosity=1 --settings=config.settings
      npm ci --prefix client
      npm run build --prefix client
      DATABASE_URL='sqlite:////tmp/careon-build.sqlite3' python manage.py collectstatic --noinput --settings=config.settings
      DATABASE_URL='sqlite:////tmp/careon-build.sqlite3' python manage.py migrate --noinput --settings=config.settings
    startCommand: |
      if [ -z "$DATABASE_URL" ]; then
        echo "ERROR: DATABASE_URL is missing from the Render runtime environment."
        echo "Set it on the careon-web service, then redeploy."
        exit 1
      fi
      python - <<'PY'
import os
import sys
from urllib.parse import urlparse

url = os.environ.get("DATABASE_URL", "").strip()
parsed = urlparse(url)

if parsed.scheme not in {"postgres", "postgresql"}:
    print(
        "ERROR: DATABASE_URL must start with postgresql:// or postgres://.",
        file=sys.stderr,
    )
    sys.exit(1)

if not parsed.hostname:
    print(
        "ERROR: DATABASE_URL is missing a hostname. Check the part after '@'.",
        file=sys.stderr,
    )
    sys.exit(1)

if not parsed.path or parsed.path == "/":
    print(
        "ERROR: DATABASE_URL is missing a database name. Check the path after the host.",
        file=sys.stderr,
    )
    sys.exit(1)

print(
    f"DATABASE_URL detected: scheme={parsed.scheme} host={parsed.hostname} "
    f"port={parsed.port or 5432} database={parsed.path.lstrip('/')}"
)
PY
      if [ $? -ne 0 ]; then
        exit 1
      fi
      python manage.py migrate --noinput --settings=config.settings_production &&
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: NODE_VERSION
        value: 20.18.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: "true"
