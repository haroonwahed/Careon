services:
  - type: redis
    name: carelane-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: carelane
    runtime: python
    plan: free
    branch: main
    autoDeploy: false
    healthCheckPath: /_health/
    # Co-locate the app with the database. The Postgres (Supabase) lives in
    # eu-west-1 (Ireland); Frankfurt is Render's closest EU region. Without this
    # Render defaults to Oregon (US-West) — every DB query then crosses the
    # Atlantic (~130ms RTT), and pages that fire ~10+ queries take seconds.
    # NOTE: Render fixes a service's region at creation; applying this to the
    # live service requires recreating it in Frankfurt (DB stays in eu-west-1).
    region: frankfurt
    buildCommand: |
      pip install -r requirements/runtime.txt
      PYTHON_BIN="$(command -v python || command -v python3)"
      DJANGO_TEST_LOG_LEVEL=ERROR DATABASE_URL='sqlite:////tmp/carelane-build.sqlite3' "$PYTHON_BIN" manage.py check --settings=config.settings
      npm ci --prefix client
      npm run build --prefix client
      DATABASE_URL='sqlite:////tmp/carelane-build.sqlite3' "$PYTHON_BIN" manage.py collectstatic --noinput --settings=config.settings
      DATABASE_URL='sqlite:////tmp/carelane-build.sqlite3' "$PYTHON_BIN" manage.py migrate --noinput --settings=config.settings
    # One line so manual Start Command on Render can match: bash scripts/render_start_command.sh
    startCommand: bash scripts/render_start_command.sh
    envVars:
      # Unbuffered Python stdout/stderr so migrate/gunicorn lines show in Render logs without delay.
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: NODE_VERSION
        value: 20.18.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: carelane-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: www.carelane.nl
      - key: CSRF_TRUSTED_ORIGINS
        value: https://www.carelane.nl
      # Public site URL for Django templates (nav links).
      - key: SPA_ORIGIN
        value: https://www.carelane.nl
      # Must match Google OAuth authorized redirect URI origin.
      - key: OIDC_PUBLIC_BASE_URL
        value: https://www.carelane.nl
      # Google SSO (OIDC). The "Doorgaan met organisatieaccount" button on the
      # login page ONLY appears when SSO is fully configured. These were missing
      # from the blueprint, so a service recreate silently dropped SSO. Declared
      # here so they surface on every (re)create. Secrets stay unsynced; set
      # SSO_ENABLED=true and the client id/secret on the service. The discovery
      # endpoint + scopes are public Google constants, so they carry a value.
      - key: SSO_ENABLED
        sync: false
      - key: OIDC_RP_CLIENT_ID
        sync: false
      - key: OIDC_RP_CLIENT_SECRET
        sync: false
      - key: OIDC_OP_DISCOVERY_ENDPOINT
        value: https://accounts.google.com/.well-known/openid-configuration
      - key: OIDC_RP_SCOPES
        value: openid email profile
      # Optional map/geocoding (PDOK is default for backend geocoding).
      - key: GOOGLE_GEOCODING_API_KEY
        sync: false
      - key: VITE_MAP_BASEMAP
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: "true"
      - key: NGINX_MEDIA_ACCEL_REDIRECT
        value: "false"
      # Keep at 1 until carelane-redis is provisioned via Blueprint sync; raise only with REDIS_URL live.
      - key: GUNICORN_WORKERS
        value: "1"
      # Error monitoring. Set SENTRY_DSN in Render dashboard (never commit the DSN).
      # SENTRY_RELEASE is set automatically by the deploy hook to the git SHA.
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_RELEASE
        sync: false

  # ---------------------------------------------------------------------------
  # Staging service — isolated from production
  # ---------------------------------------------------------------------------
  # Points at main by default; switch to a staging branch once you have one.
  # DATABASE_URL must point at a SEPARATE Supabase project — never share a DB
  # between staging and production.
  # After creating this service in Render, set STAGING_HOST to the assigned
  # *.onrender.com hostname so ALLOWED_HOSTS and CSRF_TRUSTED_ORIGINS resolve.
  - type: web
    name: carelane-staging
    runtime: python
    plan: free
    branch: main
    autoDeploy: false
    healthCheckPath: /_health/
    region: frankfurt
    buildCommand: |
      pip install -r requirements/runtime.txt
      PYTHON_BIN="$(command -v python || command -v python3)"
      DJANGO_TEST_LOG_LEVEL=ERROR DATABASE_URL='sqlite:////tmp/carelane-build.sqlite3' "$PYTHON_BIN" manage.py check --settings=config.settings
      npm ci --prefix client
      npm run build --prefix client
      DATABASE_URL='sqlite:////tmp/carelane-build.sqlite3' "$PYTHON_BIN" manage.py collectstatic --noinput --settings=config.settings
      DATABASE_URL='sqlite:////tmp/carelane-build.sqlite3' "$PYTHON_BIN" manage.py migrate --noinput --settings=config.settings
    startCommand: bash scripts/render_start_command.sh
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: NODE_VERSION
        value: 20.18.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_staging
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # Must be a separate Supabase project from production.
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: carelane-redis
          property: connectionString
      # Set to the Render-assigned *.onrender.com hostname after service creation.
      - key: STAGING_HOST
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SPA_ORIGIN
        sync: false
      - key: OIDC_PUBLIC_BASE_URL
        sync: false
      - key: SSO_ENABLED
        value: "0"
      - key: OIDC_RP_CLIENT_ID
        sync: false
      - key: OIDC_RP_CLIENT_SECRET
        sync: false
      - key: OIDC_OP_DISCOVERY_ENDPOINT
        value: https://accounts.google.com/.well-known/openid-configuration
      - key: OIDC_RP_SCOPES
        value: openid email profile
      - key: DEFAULT_FROM_EMAIL
        value: staging-noreply@carelane.nl
      - key: SECURE_SSL_REDIRECT
        value: "true"
      - key: NGINX_MEDIA_ACCEL_REDIRECT
        value: "false"
      - key: GUNICORN_WORKERS
        sync: false
      # Demo seed — staging only. These must NOT appear on the production service.
      - key: PILOT_AUTO_BOOTSTRAP
        value: "1"
      - key: E2E_DEMO_PASSWORD
        value: pilot_demo_pass_123
      - key: PILOT_FULL_DEMO_SEED
        value: "1"
      # Sentry — same DSN, different environment tag.
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: staging
      - key: SENTRY_RELEASE
        sync: false
