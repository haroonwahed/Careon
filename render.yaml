services:
  - type: web
    name: careon-web
    runtime: python
    plan: free
    buildCommand: |
      BUILD_DATABASE_URL="${DATABASE_URL:-sqlite:////tmp/careon-build.sqlite3}"
      pip install -r requirements/runtime.txt
      DATABASE_URL="$BUILD_DATABASE_URL" python manage.py test tests --verbosity=1 --settings=config.settings
      npm ci --prefix client
      npm run build --prefix client
      DATABASE_URL="$BUILD_DATABASE_URL" python manage.py collectstatic --noinput --settings=config.settings
      if [ -z "$DATABASE_URL" ]; then
        echo "DATABASE_URL not set. Using temporary SQLite for build."
        DATABASE_URL="$BUILD_DATABASE_URL" python manage.py migrate --noinput --settings=config.settings
      else
        python manage.py migrate --noinput --settings=config.settings
      fi
    startCommand: |
      if [ -z "$DATABASE_URL" ]; then
        echo "WARNING: DATABASE_URL not set. Skipping migrations at startup."
        gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120
      else
        python manage.py migrate --noinput --settings=config.settings &&
        gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120
      fi
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: NODE_VERSION
        value: 20.18.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: ""
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: "true"