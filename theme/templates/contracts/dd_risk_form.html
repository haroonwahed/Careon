{% extends "base.html" %}
{% block title %}Add Due Diligence Risk - CMS Aegis{% endblock %}
{% block content %}
<div class="max-w-2xl">
    <div class="mb-6"><h1 class="text-2xl font-bold text-gray-900">Add Due Diligence Risk</h1></div>
    <form method="post" class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <div class="flex gap-3 pt-4">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700">Add Risk</button>
        </div>
    </form>
</div>
{% endblock %}
