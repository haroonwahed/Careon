{% extends 'base_fullscreen.html' %}
{% load static %}

{% block title %}Signed Out - CMS Aegis{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 p-4">
    <div class="w-full max-w-md text-center">
        <div class="w-16 h-16 rounded-2xl mx-auto mb-6 flex items-center justify-center" style="background: linear-gradient(135deg, #1e3a5f, #2563eb);">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-900 mb-2">You've been signed out</h1>
        <p class="text-sm text-slate-500 mb-8">Thanks for using CMS Aegis. See you next time.</p>
        <a href="{% url 'login' %}" class="inline-flex items-center gap-2 px-8 py-3 text-white rounded-xl font-semibold text-sm transition shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40" style="background: linear-gradient(135deg, #1e3a5f, #2563eb);">
            Sign in again
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
        </a>
    </div>
</div>
{% endblock %}
