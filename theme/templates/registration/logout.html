
{% extends 'base_fullscreen.html' %}

{% block title %}Signed out - Bolton CLM{% endblock %}

{% block content %}
<div class="card p-8 text-center">
    <div class="mb-6">
        <svg class="w-16 h-16 text-primary-600 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <h1 class="text-2xl font-medium text-primary-700 mb-3">You've been signed out</h1>
        <p class="text-muted text-sm">
            Thank you for using Bolton CLM. You have been successfully signed out.
        </p>
    </div>
    
    <div class="space-y-3">
        <a href="{% url 'login' %}" class="btn-primary w-full">
            Sign in again
        </a>
        <a href="{% url 'index' %}" class="btn-ghost w-full">
            Go to homepage
        </a>
    </div>
</div>
{% endblock %}
