{% extends 'base_fullscreen.html' %}
{% load static %}

{% block title %}Wachtwoord opgeslagen — Carelane{% endblock %}

{% block body %}
<style>
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  display: block !important;
  align-items: unset !important;
  justify-content: unset !important;
  padding: 0 !important;
  background: #070b12;
  color: #f1f5f9;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.sa-shell {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: 32px 16px;
}
.sa-card {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.sa-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.sa-logo-mark {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 9px;
  background: rgba(124,77,255,0.15); border: 1px solid rgba(124,77,255,0.3);
}
.sa-logo-mark svg { width: 18px; height: 18px; color: #c4b5fd; }
.sa-logo-name { font-size: 16px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.02em; }
.sa-icon-wrap {
  display: flex; align-items: center; justify-content: center;
  width: 52px; height: 52px; border-radius: 14px;
  background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25);
}
.sa-icon-wrap svg { width: 26px; height: 26px; color: #4ade80; }
.sa-card-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #7C4DFF; }
.sa-card-title { font-size: 24px; font-weight: 700; letter-spacing: -0.025em; color: #f1f5f9; margin: 4px 0 0; }
.sa-card-sub { font-size: 14px; color: #64748b; margin: 6px 0 0; line-height: 1.5; }
.sa-submit {
  display: block; width: 100%; padding: 11px 16px; border-radius: 10px; border: none;
  background: #7C4DFF; color: #fff; font-size: 14px; font-weight: 600;
  cursor: pointer; text-decoration: none; text-align: center;
  transition: background 0.15s, box-shadow 0.15s; letter-spacing: -0.01em;
  box-sizing: border-box;
}
.sa-submit:hover { background: #6F42E8; box-shadow: 0 4px 16px rgba(124,77,255,0.3); }
.sa-submit:active { background: #5E35D0; }
</style>

<div class="sa-shell">
  <div class="sa-card">
    <div class="sa-logo" aria-hidden="true">
      <img src="{% static 'spa/brand/logos/png/carelane-logo-gradient-white-transparent.png' %}" alt="Carelane" draggable="false" style="height:30px;width:auto;object-fit:contain;display:block;">
    </div>

    <div class="sa-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>

    <div>
      <div class="sa-card-eyebrow">Gelukt</div>
      <h1 class="sa-card-title">Wachtwoord opgeslagen</h1>
      <p class="sa-card-sub">Je wachtwoord is bijgewerkt. Je kunt nu inloggen met je nieuwe wachtwoord.</p>
    </div>

    <a href="{% url 'login' %}" class="sa-submit">Inloggen</a>
  </div>
</div>
{% endblock %}
