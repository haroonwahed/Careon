{% load static %}
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Careon{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="{% static 'css/theme-careon.css' %}" rel="stylesheet">

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Top Navigation -->
    <nav class="bg-white border-b border-gray-200 fixed w-full top-0 z-50">
        <div class="max-w-[1200px] mx-auto px-6">
            <div class="flex justify-between items-center h-16">
                <!-- Left side -->
                <div class="flex items-center space-x-8">
                    <div class="font-semibold text-lg text-gray-900">Careon</div>

                    <!-- Tab Navigation -->
                    <div class="hidden lg:flex space-x-6">
                        <a href="{% url 'dashboard' %}" class="nav-tab {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                            Overzicht
                        </a>
                        <a href="{% url 'contracts:case_list' %}" class="nav-tab">
                            Casussen
                        </a>
                        <a href="#" class="nav-tab">
                            Dossiers
                        </a>
                        <a href="{% url 'contracts:workflow_dashboard' %}" class="nav-tab">
                            Regiestappen
                        </a>
                        <a href="#" class="nav-tab">
                            Inzichten
                        </a>
                        <a href="#" class="nav-tab">
                            Actiepunten
                        </a>
                        <a href="#" class="nav-tab">
                            Entiteiten
                        </a>
                    </div>
                </div>

                <!-- Right side -->
                <div class="flex items-center space-x-4">
                    <!-- Global Search -->
                    <div class="relative">
                        <input type="search" 
                               placeholder="Zoek casussen en dossiers..." 
                               class="w-64 pl-10 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <svg class="w-4 h-4 text-gray-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>

                    <!-- User Menu -->
                    <div class="relative" x-data="{ open: false }">
                        <button @click="open = !open" class="flex items-center space-x-2 text-gray-700 hover:text-gray-900">
                            <span class="text-sm font-medium">{{ user.get_full_name|default:user.username }}</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>

                        <div x-show="open" @click.away="open = false" x-cloak 
                             class="absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-lg">
                            <a href="{% url 'profile' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Profiel</a>
                            <a href="{% url 'settings_hub' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Instellingen</a>
                            <a href="{% url 'logout' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Uitloggen</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="pt-16">
        {% block content %}{% endblock %}
    </div>

    <!-- Messages -->
    {% if messages %}
        <div class="fixed bottom-4 right-4 z-50">
            {% for message in messages %}
                <div class="bg-white border border-gray-200 rounded-lg shadow-lg p-4 mb-2">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <style>
        .nav-tab {
            @apply text-sm font-medium text-gray-500 hover:text-gray-700 border-b-2 border-transparent hover:border-gray-300 pb-4 transition-colors;
        }
        .nav-tab.active {
            @apply text-blue-600 border-blue-600;
        }
        [x-cloak] { display: none !important; }
    </style>
</body>
</html>
