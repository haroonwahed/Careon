
<!DOCTYPE html>
<html lang="en" class="h-full bg-white">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Bolton CLM{% endblock %}</title>
    
    <!-- Load Tailwind CSS -->
    {% load static %}
    <link href="{% static 'css/dist/styles.css' %}" rel="stylesheet">
    
    <!-- Custom CSS -->
    <style>
        :root {
            --bg: #FFFFFF;
            --ink: #0B0B0C;
            --muted: #6B7280;
            --stroke: #E5E7EB;
            --accent: #0E9F6E;
            --warn: #F59E0B;
            --danger: #DC2626;
            --card: #FFFFFF;
        }
        
        body {
            font-family: Inter, system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="h-full">
    <div class="min-h-full">
        <!-- Global Navigation -->
        <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex">
                        <div class="flex-shrink-0 flex items-center">
                            <h1 class="text-xl font-semibold text-gray-900">Bolton CLM</h1>
                        </div>
                    </div>
                    
                    <!-- Global search -->
                    <div class="flex-1 flex items-center justify-center px-2 lg:ml-6 lg:justify-end">
                        <div class="max-w-lg w-full lg:max-w-xs">
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                    </svg>
                                </div>
                                <input class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:placeholder-gray-400 focus:ring-1 focus:ring-green-500 focus:border-green-500 sm:text-sm" placeholder="Global search" type="search">
                            </div>
                        </div>
                    </div>
                    
                    <!-- Right menu -->
                    <div class="flex items-center">
                        <button type="button" class="bg-green-600 p-1 rounded-full text-white hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                            </svg>
                            <span class="sr-only">New Contract</span>
                        </button>
                        
                        <!-- User menu -->
                        <div class="ml-4 relative flex-shrink-0">
                            <div class="flex items-center text-sm rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                                <span class="text-gray-700">{{ user.username|default:"User" }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Page content -->
        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <!-- Scripts -->
    {% block extra_js %}
    {% endblock %}
</body>
</html>
