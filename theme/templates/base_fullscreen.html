<!DOCTYPE html>
<html lang="nl" data-theme="light">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Careon{% endblock %}</title>
    <link href="{% static 'css/zorgregie-design-system.css' %}" rel="stylesheet">
    <script defer src="{% static 'js/theme-switcher.js' %}"></script>
</head>
<body class="auth-page-body">
    {% block body %}
    <div class="auth-frame">
        <div class="auth-card-shell">
            {% block content %}{% endblock %}
        </div>
    </div>
    {% endblock %}
</body>
</html>
