
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bolton CLM{% endblock %}</title>
    {% load static %}
    <link href="{% static 'css/dist/styles.css' %}" rel="stylesheet">
</head>
<body style="background: var(--bg);" class="font-sans min-h-screen flex items-center justify-center">
    <!-- Bolton Logo Header -->
    <div class="absolute top-0 left-0 right-0" style="background: var(--card); border-bottom: 1px solid var(--border);">
        <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">
            <div class="flex items-center">
                <a href="{% url 'index' %}" class="flex items-center focus-ring rounded-2xl">
                    <svg width="180" height="45" viewBox="0 0 180 45" class="mr-2">
                        <!-- Bolton logo with brand colors -->
                        <rect x="0" y="8" width="40" height="32" fill="var(--primary-700)" rx="6"/>

                        <!-- White architectural lines -->
                        <g fill="white" stroke="white" stroke-width="0.5">
                            <rect x="8" y="12" width="2" height="20"/>
                            <rect x="12" y="12" width="2" height="20"/>
                            <rect x="16" y="12" width="2" height="20"/>
                            <rect x="20" y="12" width="2" height="20"/>
                            <rect x="24" y="12" width="2" height="20"/>
                            <rect x="28" y="12" width="2" height="20"/>

                            <rect x="6" y="14" width="28" height="1"/>
                            <rect x="6" y="18" width="28" height="1"/>
                            <rect x="6" y="22" width="28" height="1"/>
                            <rect x="6" y="26" width="28" height="1"/>
                            <rect x="6" y="30" width="28" height="1"/>
                        </g>

                        <text x="15" y="30" fill="white" font-family="Arial Black, sans-serif" font-size="16" font-weight="900">B</text>
                        <text x="45" y="25" fill="var(--primary-700)" font-family="Inter, sans-serif" font-size="18" font-weight="bold" letter-spacing="2">BOLTON</text>
                        <text x="45" y="38" fill="var(--primary-600)" font-family="Inter, sans-serif" font-size="14" font-weight="normal" letter-spacing="2">CLM</text>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="w-full max-w-md mx-auto px-6 pt-20">
        {% block content %}
        {% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
